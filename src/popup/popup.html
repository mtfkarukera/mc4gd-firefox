<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="ext_name"></title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="app-header">
    <h1 class="sr-only" data-i18n="ext_name"></h1>
    <div class="logo">
      <img class="logo-icon" src="../../icons/icon.svg" alt="Logo" aria-hidden="true" />
      <span data-i18n="ext_name"></span>
    </div>
    <div id="auth-status" class="status-badge status-loading" data-i18n="popup_auth_loading" aria-live="polite"></div>
    <select id="lang-select" data-i18n-aria-label="lang_select_label">
      <option value="auto" data-i18n="lang_auto">Auto</option>
      <option value="gcf" data-i18n="lang_gcf">Kréyòl</option>
    </select>
  </header>

  <!-- FICHIER DÉTECTÉ -->
  <section class="file-section">
    <h2 class="section-title" data-i18n="popup_idle_label"></h2>
    <div id="file-info" class="file-info">
      <span id="file-icon" class="file-icon"><span aria-hidden="true">📄</span></span>
      <span id="file-name" class="file-name" data-i18n="popup_detecting"></span>
    </div>
  </section>

  <!-- ACTION PRINCIPALE -->
  <section class="action-section">
    <button id="upload-btn" class="btn primary-btn" disabled>
      <span class="btn-text" data-i18n="popup_btn_upload"></span>
      <span id="btn-spinner" class="spinner hidden" aria-hidden="true"></span>
    </button>
    <div id="progress-container" class="progress-container hidden">
      <div id="progress-bar" class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" data-i18n-aria-label="progress_label"></div>
    </div>
    <div id="drive-link-row" class="drive-link-row hidden">
      <a id="drive-link" href="#" target="_blank" rel="noopener noreferrer" data-i18n="popup_link_view"></a>
    </div>
  </section>

  <!-- STATUT -->
  <footer class="app-footer">
    <div id="status-message" class="status-message" data-i18n="popup_detecting" aria-live="polite"></div>
    <button id="disconnect-btn" class="btn close-btn hidden" data-i18n="popup_btn_disconnect"></button>
  </footer>

  <!-- ONBOARDING OVERLAY -->
  <div id="onboarding-overlay" class="onboarding-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="onboarding-title">
    <div class="onboarding-card">
      <img class="onboarding-logo" src="../../icons/icon.svg" alt="Logo" aria-hidden="true" />
      <h1 id="onboarding-title" data-i18n="onboarding_title"></h1>
      <p data-i18n="onboarding_description"></p>
      <button id="onboarding-btn" class="btn primary-btn" data-i18n="onboarding_btn_ok"></button>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
